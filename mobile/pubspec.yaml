name: mobile
description: "AutoDoc Tracker — Track your Romanian vehicle document expiration dates."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Secure token/session storage
  flutter_secure_storage: ^9.2.2

  # Date/number formatting
  intl: ^0.19.0

  # Visual progress indicators
  percent_indicator: ^4.2.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
