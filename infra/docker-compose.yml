version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: carlina_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-carlina}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-carlina_password}
      POSTGRES_DB: ${DB_NAME:-carlina_db}
    ports:
      - "5436:5432"
    volumes:
      - carlina_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-carlina} -d ${DB_NAME:-carlina_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../api
    container_name: carlina_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../api/.env.development
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "3000:3000"
    volumes:
      - carlina_uploads:/app/uploads

volumes:
  carlina_postgres_data:
  carlina_uploads:
